version: 2

project_name: terraform-k3s-vps-wg

before:
  hooks:
    - go mod tidy

builds:
  - id: terraform-provider-k3s-vps-wg
    binary: terraform-provider-k3s-vps-wg_v{{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  prerelease: auto
